# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run:
          hugo --gc --minify  --baseURL "${{ steps.pages.outputs.base_url }}"
      - name: Inspect build output
        run: |
          test -f public/index.html
          test -f public/CNAME
          du -sh public
          printf 'CNAME: '
          cat public/CNAME
          printf '\n'
          if find public -type l | grep -q .; then
            echo "GitHub Pages artifacts cannot contain symlinks."
            find public -type l -ls
            exit 1
          fi
          if find public -type f -size +100M | grep -q .; then
            echo "GitHub Pages artifacts cannot contain files larger than 100 MB."
            find public -type f -size +100M -print
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Show Pages deployment diagnostics
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          api_url="${GITHUB_API_URL:-https://api.github.com}"
          pages_url="${api_url}/repos/${GITHUB_REPOSITORY}/pages"
          deployment_url="${api_url}/repos/${GITHUB_REPOSITORY}/pages/deployments/${GITHUB_SHA}"
          echo "Fetching Pages configuration from ${pages_url}"
          curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${pages_url}" || true
          printf '\n'
          echo "Fetching Pages deployment status from ${deployment_url}"
          curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${deployment_url}" || true
