<section class="container">
  <h1>Performance measurement results</h1>

  <p> descibe current kernel</p>

<div class="custom-control custom-checkbox">
    <input type="checkbox" class="custom-control-input" id="cb0">
    <label class="custom-control-label" for="cb0">Device 1</label>
</div>

<div class="custom-control custom-checkbox">
    <input type="checkbox" class="custom-control-input" id="defaultUnchecked1">
    <label class="custom-control-label" for="defaultUnchecked1">Framework 1</label>
</div>
<div class="custom-control custom-checkbox">
    <input type="checkbox" class="custom-control-input" id="defaultUnchecked2">
    <label class="custom-control-label" for="defaultUnchecked2">Framework 2</label>
</div>

<canvas id="myChart" width="800" height="450"></canvas>

<script>
//the data will be injected by a plugin from SSG side
var data = {
    labels: ["Device 1", "Device 2", "Device 3"],
    datasets: [
        {
            label: "Framework 1",
            backgroundColor: "TEAL",
            data: [3, null, 4]
        },
        {
            label: "Framework 2",
            backgroundColor: "OLIVE",
            data: [4, 3, 4.5]
        },
        {
            label: "Framework 3",
            backgroundColor: "ORANGE",
            data: [7.1, 2, 6]
        }
    ]
};
</script>

<script>
var ctx = document.getElementById("myChart").getContext("2d");
var color = Chart.helpers.color;

var myBarChart = new Chart(ctx, {
    type: 'bar',
    data: data,
    options: {
        barValueSpacing: 20,
        scales: {
            yAxes: 
            [
            {
                ticks: 
                {
                    min: 0,
                },
                scaleLabel: 
                {
                    display: true,
                    labelString: 'Epoch time'
                }            
            }
            ]
        }
    }
});
</script>
